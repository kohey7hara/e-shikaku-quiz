<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>E資格対策ドリル</title>
    <script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]},svg:{fontCache:'global'}};</script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --ink:#10243e; --muted:#66758a; --navy:#102a43; --blue:#1363df; --cyan:#3cc8c8; --paper:#f5f7fb; --line:#dce3ed; --good:#12805c; --bad:#c53b4a; }
        * { box-sizing:border-box; }
        body { margin:0; color:var(--ink); background:radial-gradient(circle at 85% 0,#dff7f7 0,transparent 28rem),var(--paper); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif; }
        body::before { content:""; display:block; height:5px; background:linear-gradient(90deg,var(--blue),var(--cyan)); }
        .shell { width:min(920px,calc(100% - 32px)); margin:auto; padding:28px 0 64px; }
        header { display:flex; gap:20px; justify-content:space-between; align-items:center; margin-bottom:24px; }
        header h1 { margin:0; font-size:clamp(1.1rem,3vw,1.55rem); letter-spacing:-.02em; }
        .home-btn { flex:none; color:var(--ink); text-decoration:none; border:1px solid var(--line); background:#fff; padding:10px 14px; border-radius:999px; font-weight:700; }
        .tabs { display:flex; gap:8px; padding:5px; background:#e8edf4; border-radius:14px; margin-bottom:22px; }
        .tab { appearance:none; border:0; flex:1; padding:11px; border-radius:10px; color:var(--muted); background:transparent; font-weight:800; cursor:pointer; }
        .tab.active { color:#fff; background:var(--navy); box-shadow:0 5px 14px #102a4333; }
        .content-area { display:none; }
        .content-area.active { display:block; animation:fade .2s ease; }
        .cheat-sheet,.setup-card,.question-card,.finish-card { background:#fff; border:1px solid #e5eaf1; border-radius:22px; padding:clamp(20px,4vw,34px); box-shadow:0 16px 45px #1d36531a; }
        .cheat-sheet { line-height:1.75; }
        .cheat-sheet h3 { margin-top:32px; border-left:5px solid var(--cyan); padding:8px 12px; background:#f1fafa; }
        .cheat-sheet table { width:100%; border-collapse:collapse; display:block; overflow-x:auto; }
        .cheat-sheet th,.cheat-sheet td { border:1px solid var(--line); padding:9px; text-align:left; min-width:120px; }
        .cheat-sheet th { background:#edf5ff; }
        code { background:#edf1f6; padding:.15em .35em; border-radius:5px; }
        .primary-link { display:block; margin:22px auto 0; padding:13px 28px; border:0; border-radius:12px; color:#fff; background:var(--blue); font-weight:800; cursor:pointer; }
        .eyebrow { color:var(--blue); font-size:.72rem; letter-spacing:.16em; font-weight:900; margin:0 0 6px; }
        .setup-card h2,.finish-card h2 { margin:0 0 20px; font-size:1.65rem; }
        .setup-stats { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px; }
        .setup-stats span { background:#f1f5fa; padding:10px 14px; border-radius:10px; color:var(--muted); }
        .setup-stats strong { color:var(--ink); font-size:1.2rem; }
        .mode-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
        .mode-grid button { text-align:left; border:1px solid var(--line); background:#fff; padding:18px; border-radius:14px; color:var(--ink); cursor:pointer; transition:.15s; }
        .mode-grid button:hover:not(:disabled) { transform:translateY(-2px); border-color:var(--blue); box-shadow:0 8px 20px #1363df1a; }
        .mode-grid button:disabled { opacity:.45; cursor:not-allowed; }
        .mode-grid strong,.mode-grid small { display:block; }
        .mode-grid small { color:var(--muted); margin-top:5px; line-height:1.4; }
        .pace-note { margin:22px 0 0; color:var(--muted); font-size:.9rem; }
        #scoreBoard { position:sticky; top:8px; z-index:3; display:flex; flex-wrap:wrap; gap:12px 18px; align-items:center; padding:13px 16px; margin-bottom:14px; background:#102a43f2; color:#fff; border-radius:14px; box-shadow:0 8px 25px #102a4344; font-weight:700; font-variant-numeric:tabular-nums; backdrop-filter:blur(8px); }
        .progress-track { flex-basis:100%; height:4px; background:#ffffff33; border-radius:5px; overflow:hidden; }
        .progress-track i { display:block; height:100%; background:var(--cyan); transition:width .2s; }
        .pace-over { color:#ffcf66; }
        .question-meta { display:flex; gap:7px; color:var(--muted); font-size:.75rem; font-weight:800; margin-bottom:18px; }
        .question-meta span { padding:5px 8px; border:1px solid var(--line); border-radius:999px; }
        .question-meta .category-tag { color:var(--blue); background:#edf5ff; border-color:#cfe1fb; }
        .question-text { font-size:clamp(1.05rem,2.5vw,1.25rem); line-height:1.7; font-weight:750; margin-bottom:22px; }
        .exam-stem { font-weight:500; }
        .exam-figure { margin:16px 0; padding:16px; overflow-x:auto; border:1px solid #cfdae7; border-radius:14px; background:#f7fafc; color:#17324d; }
        .exam-figure .figure-title { display:block; margin-bottom:12px; color:#315d85; font-size:.78rem; font-weight:900; letter-spacing:.08em; }
        .diagram-row { display:flex; align-items:center; justify-content:center; gap:9px; min-width:620px; }
        .diagram-column { display:grid; gap:9px; justify-items:center; }
        .diagram-node { min-width:105px; padding:10px 12px; border:2px solid #7da4c7; border-radius:11px; background:#fff; text-align:center; font-size:.88rem; font-weight:850; box-shadow:0 4px 10px #1d365314; }
        .diagram-node.primary { border-color:#1769df; background:#eaf3ff; }
        .diagram-node.accent { border-color:#14a393; background:#e9faf7; }
        .diagram-node.warn { border-color:#e2a02b; background:#fff8e8; }
        .diagram-arrow { color:#397399; font-size:1.45rem; font-weight:900; white-space:nowrap; }
        .diagram-label { color:#5b6f82; font-size:.75rem; font-weight:800; text-align:center; }
        .figure-table { width:100%; min-width:520px; border-collapse:collapse; font-size:.86rem; }
        .figure-table th,.figure-table td { border:1px solid #b9cad9; padding:8px; text-align:center; }
        .figure-table th { background:#dfeeff; }
        .figure-table .hot { background:#ffe2b8; font-weight:900; }
        .figure-table .masked { color:#8d99a5; background:#edf0f3; }
        .code-figure { margin:0; min-width:620px; white-space:pre; font:600 .82rem/1.6 ui-monospace,SFMono-Regular,Menlo,monospace; color:#dcecff; background:#102c45; border-radius:10px; padding:14px; }
        .figure-caption { margin:10px 0 0; color:#65798b; font-size:.78rem; font-weight:650; }
        .curve-svg { display:block; width:100%; min-width:520px; height:auto; }
        .options-container { display:grid; gap:10px; }
        .option-btn { width:100%; display:flex; gap:12px; align-items:flex-start; text-align:left; color:var(--ink); border:1px solid var(--line); background:#fff; border-radius:13px; padding:14px; font:inherit; line-height:1.55; cursor:pointer; }
        .option-btn:hover:not(:disabled) { border-color:var(--blue); background:#f6f9ff; }
        .option-btn b { display:grid; place-items:center; width:25px; height:25px; flex:none; border-radius:7px; background:#eaf0f7; }
        .option-btn.answer-correct { border-color:var(--good); background:#eaf8f3; }
        .option-btn.answer-wrong { border-color:var(--bad); background:#fff0f2; }
        .result { margin-top:18px; padding:20px; border-radius:14px; }
        .result.correct { background:#eaf8f3; border-left:5px solid var(--good); }
        .result.incorrect { background:#fff0f2; border-left:5px solid var(--bad); }
        .result-title { font-size:1.08rem; font-weight:900; }
        .result-title span { display:block; color:var(--muted); font-size:.82rem; margin-top:3px; font-weight:600; }
        .explanation,.trap { background:#fff; border-radius:10px; padding:14px; margin-top:12px; line-height:1.7; }
        .explanation strong,.trap strong { display:block; color:var(--blue); margin-bottom:5px; }
        .trap { border:1px dashed #dfad3e; background:#fffaf0; }
        .trap strong { color:#9a6814; }
        .next-btn,.finish-actions button { border:0; border-radius:10px; padding:12px 18px; background:var(--navy); color:#fff; font-weight:800; cursor:pointer; margin-top:14px; }
        .finish-card { text-align:center; }
        .score-ring { width:150px; height:150px; display:grid; place-items:center; margin:18px auto; border-radius:50%; background:conic-gradient(var(--cyan) var(--score),#e7edf3 0); position:relative; }
        .score-ring::after { content:""; position:absolute; inset:12px; border-radius:50%; background:#fff; }
        .score-ring strong { position:relative; z-index:1; font-size:2.5rem; }
        .score-ring small { font-size:1rem; }
        .category-results { display:grid; gap:6px; margin:22px 0; text-align:left; }
        .category-results div { display:flex; justify-content:space-between; padding:10px 12px; border-bottom:1px solid var(--line); }
        .weak-advice { background:#fff8e8; padding:13px; border-radius:10px; }
        .weak-advice strong { display:block; }
        .finish-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
        .error-message { color:var(--bad); font-weight:800; }
        [hidden] { display:none !important; }
        @keyframes fade { from { opacity:0; transform:translateY(4px); } }
        @media(max-width:680px) { .mode-grid{grid-template-columns:1fr}.shell{width:min(100% - 20px,920px)}header{align-items:flex-start}.question-card{padding:20px}.cheat-sheet{font-size:.92rem}.exam-figure{padding:11px} }
    </style>
</head>
<body>
<main class="shell">
    <header><h1 id="quizTitle">読み込み中...</h1><a href="index.html" class="home-btn">一覧へ</a></header>
    <div class="tabs"><button class="tab active" onclick="switchTab('cheatsheet')">要点まとめ</button><button class="tab" onclick="switchTab('quiz')">実戦演習</button></div>
    <section id="cheatsheet-area" class="content-area active"><div id="cheatSheetContent" class="cheat-sheet"></div><button class="primary-link" onclick="switchTab('quiz')">演習を始める</button></section>
    <section id="quiz-area" class="content-area"><div id="sessionSetup"></div><div id="scoreBoard" hidden></div><div id="quizContainer" hidden></div></section>
</main>
<script src="js/app.js?v=20260713-visual"></script>
</body>
</html>
